<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羽毛球启动步训练器</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .title {
            font-size: 24px;
            color: #888;
            margin-bottom: 15px;
        }

        /* 设置面板 */
        .settings {
            background-color: #1e1e1e;
            border-radius: 15px;
            padding: 20px 25px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 350px;
        }

        .settings-title {
            font-size: 16px;
            color: #aaa;
            margin-bottom: 15px;
            text-align: center;
        }

        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .setting-row label {
            font-size: 16px;
            color: #ccc;
        }

        .setting-row input {
            width: 80px;
            padding: 10px;
            font-size: 18px;
            text-align: center;
            border: none;
            border-radius: 8px;
            background-color: #333;
            color: #fff;
        }

        .setting-row input:focus {
            outline: 2px solid #2979ff;
        }

        .unit {
            font-size: 14px;
            color: #888;
            margin-left: 5px;
        }

        /* 显示区域 */
        .display-area {
            height: 35vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #number-display {
            font-size: 160px;
            font-weight: bold;
            color: #00e676;
            text-shadow: 0 0 20px rgba(0, 230, 118, 0.5);
            transition: all 0.1s ease-in-out;
            line-height: 1;
        }

        #direction-text {
            font-size: 28px;
            color: #888;
            margin-top: 10px;
        }

        .pop {
            transform: scale(1.15);
            color: #ff3d00 !important;
            text-shadow: 0 0 30px rgba(255, 61, 0, 0.8) !important;
        }

        button {
            margin-top: 30px;
            padding: 18px 60px;
            font-size: 26px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            background-color: #2979ff;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(41, 121, 255, 0.4);
            transition: all 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        button.stop {
            background-color: #ff3d00;
            box-shadow: 0 4px 15px rgba(255, 61, 0, 0.4);
        }

        /* 训练中隐藏设置 */
        .settings.hidden {
            display: none;
        }

        .tips {
            margin-top: 25px;
            font-size: 13px;
            color: #555;
            text-align: center;
            max-width: 85%;
        }

        /* 计数器 */
        .counter {
            margin-top: 15px;
            font-size: 16px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="title">🏸 羽毛球启动步训练</div>

    <!-- 设置面板 -->
    <div class="settings" id="settings">
        <div class="settings-title">⏱️ 间隔时间设置</div>
        <div class="setting-row">
            <label>最小间隔</label>
            <div>
                <input type="number" id="min-interval" value="3" min="1" max="10" step="0.5">
                <span class="unit">秒</span>
            </div>
        </div>
        <div class="setting-row">
            <label>最大间隔</label>
            <div>
                <input type="number" id="max-interval" value="5" min="1" max="15" step="0.5">
                <span class="unit">秒</span>
            </div>
        </div>
    </div>

    <!-- 显示区域 -->
    <div class="display-area">
        <div id="number-display">准备</div>
        <div id="direction-text"></div>
    </div>

    <button id="ctrl-btn">开始训练</button>

    <div class="counter" id="counter"></div>

    <div class="tips">
        听到语音提示瞬间，向对应钟表方向跨步并重心下沉。<br>
        建议将手机屏幕设置为"永不息屏"
    </div>

    <script>
        let isRunning = false;
        let timerId = null;
        let audioCtx = null;
        let stepCount = 0;

        const display = document.getElementById('number-display');
        const directionText = document.getElementById('direction-text');
        const btn = document.getElementById('ctrl-btn');
        const settings = document.getElementById('settings');
        const counter = document.getElementById('counter');
        const minIntervalInput = document.getElementById('min-interval');
        const maxIntervalInput = document.getElementById('max-interval');

        // 初始化音频上下文
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // 生成"滴"声
        function playBeep() {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(0.8, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.25);
        }

        // 语音播报数字
        function speakDirection(number) {
            // 取消之前可能还在播放的语音
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(`${number}点`);
            utterance.lang = 'zh-CN';
            utterance.rate = 1.2;  // 语速稍快
            utterance.pitch = 1.0;
            utterance.volume = 1.0;
            
            window.speechSynthesis.speak(utterance);
        }

        // 获取间隔时间
        function getIntervalRange() {
            let min = parseFloat(minIntervalInput.value) || 3;
            let max = parseFloat(maxIntervalInput.value) || 5;
            
            // 确保最小值不大于最大值
            if (min > max) {
                [min, max] = [max, min];
            }
            
            // 限制范围
            min = Math.max(1, Math.min(min, 15));
            max = Math.max(1, Math.min(max, 15));
            
            return { min: min * 1000, max: max * 1000 };
        }

        // 核心训练循环
        function triggerNextStep() {
            if (!isRunning) return;

            // 1. 播放提示音
            playBeep();

            // 2. 生成随机方向 (1-12)
            const direction = Math.floor(Math.random() * 12) + 1;
            display.innerText = direction;
            directionText.innerText = `${direction}点方向`;

            // 3. 语音播报
            speakDirection(direction);

            // 4. 更新计数
            stepCount++;
            counter.innerText = `已完成: ${stepCount} 次`;

            // 5. 视觉效果
            display.classList.add('pop');
            setTimeout(() => {
                display.classList.remove('pop');
            }, 200);

            // 6. 设置下一次的随机时间
            const { min, max } = getIntervalRange();
            const delay = Math.floor(Math.random() * (max - min)) + min;
            timerId = setTimeout(triggerNextStep, delay);
        }

        // 按钮点击事件
        btn.addEventListener('click', () => {
            initAudio();

            if (isRunning) {
                // 停止训练
                isRunning = false;
                clearTimeout(timerId);
                window.speechSynthesis.cancel();
                
                btn.innerText = '开始训练';
                btn.classList.remove('stop');
                display.innerText = '准备';
                display.style.fontSize = '160px';
                directionText.innerText = '';
                settings.classList.remove('hidden');
                
                if (stepCount > 0) {
                    counter.innerText = `本次训练: ${stepCount} 次`;
                }
            } else {
                // 开始训练
                isRunning = true;
                stepCount = 0;
                
                btn.innerText = '停止训练';
                btn.classList.add('stop');
                settings.classList.add('hidden');
                counter.innerText = '';
                
                // 3秒倒计时
                display.style.fontSize = '80px';
                display.innerText = '3';
                directionText.innerText = '准备...';

                let countdown = 3;
                const countdownTimer = setInterval(() => {
                    countdown--;
                    if (countdown > 0) {
                        display.innerText = countdown;
                    } else {
                        clearInterval(countdownTimer);
                        if (isRunning) {
                            display.style.fontSize = '160px';
                            directionText.innerText = '';
                            triggerNextStep();
                        }
                    }
                }, 1000);
            }
        });

        // 防止输入框在训练中被误触修改
        [minIntervalInput, maxIntervalInput].forEach(input => {
            input.addEventListener('focus', () => {
                if (isRunning) {
                    input.blur();
                }
            });
        });
    </script>
</body>
</html>
