<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>羽毛球启动步训练器</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    background:#0b1220;
    color:#fff;
    font-family:Arial;
    text-align:center;
}
button{
    padding:10px 18px;
    margin:10px;
    border-radius:8px;
}
#num{
    font-size:80px;
    font-weight:700;
    margin-top:20px;
}
</style>
</head>

<body>

<h2>羽毛球启动步训练</h2>

<div id="num">--</div>
<div id="status">准备</div>

<button onclick="start()">开始</button>
<button onclick="stop()">停止</button>

<script>

/* =========================
   ⭐ 关键修复：BASE路径自动识别
========================= */
const BASE = (() => {
    const path = window.location.pathname;
    if (path.includes("bmt-ftwkstaup")) {
        return "/bmt-ftwkstaup/";
    }
    return "/";
})();

/* =========================
   音频系统
========================= */
const audioMap = {};

function loadAudio(){
    for(let i=1;i<=12;i++){
        audioMap[i] = new Audio(`${BASE}audio/${i}.mp3`);
    }

    audioMap.bell = new Audio(`${BASE}audio/bell.mp3`);
    audioMap.start = new Audio(`${BASE}audio/start.mp3`);
    audioMap.recover = new Audio(`${BASE}audio/recover.mp3`);
}

/* ⭐ iPhone必须解锁 */
let unlocked = false;
function unlockAudio(){
    if(unlocked) return;
    unlocked = true;

    const a = new Audio();
    a.play().catch(()=>{});

    loadAudio();
}

/* =========================
   播放函数
========================= */
function play(n){
    const a = audioMap[n];
    if(!a) return;
    a.currentTime = 0;
    a.play().catch(()=>{});
}

/* =========================
   状态逻辑
========================= */
let running = false;
let timer = null;
let current = null;

function start(){
    running = true;
    unlockAudio();

    document.getElementById("status").innerText = "开始";

    loop();
}

function stop(){
    running = false;
    clearTimeout(timer);
    document.getElementById("status").innerText = "停止";
    document.getElementById("num").innerText = "--";
}

/* =========================
   主循环
========================= */
function loop(){
    if(!running) return;

    // 准备
    document.getElementById("status").innerText = "准备";
    timer = setTimeout(()=>{

        if(!running) return;

        // 出方向
        current = Math.floor(Math.random()*12)+1;

        document.getElementById("num").innerText = current;
        document.getElementById("status").innerText = "启动";

        play("bell");

        setTimeout(()=>{
            play(current);
        },80);

        // 回位
        setTimeout(()=>{
            if(!running) return;
            document.getElementById("status").innerText = "回位";
            play("recover");
        },1500);

        // 下一轮
        setTimeout(loop, 3500);

    }, 2000 + Math.random()*2000);
}

/* =========================
   点击解锁（iOS关键）
========================= */
document.addEventListener("click", unlockAudio, {once:true});

</script>

</body>
</html>
