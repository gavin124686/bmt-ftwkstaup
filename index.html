<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羽毛球启动步训练器</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            user-select: none;
        }
        .title { font-size: 24px; color: #888; margin-bottom: 15px; }

        .settings {
            background-color: #1e1e1e;
            border-radius: 15px;
            padding: 20px 25px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 350px;
        }
        .settings-title { font-size: 16px; color: #aaa; margin-bottom: 15px; text-align: center; }
        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .setting-row label { font-size: 16px; color: #ccc; }
        .setting-row input {
            width: 80px; padding: 10px; font-size: 18px; text-align: center;
            border: none; border-radius: 8px; background-color: #333; color: #fff;
        }
        .setting-row input:focus { outline: 2px solid #2979ff; }
        .unit { font-size: 14px; color: #888; margin-left: 5px; }

        .display-area {
            height: 35vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #number-display {
            font-size: 160px;
            font-weight: bold;
            color: #00e676;
            text-shadow: 0 0 20px rgba(0, 230, 118, 0.5);
            transition: all 0.1s ease-in-out;
            line-height: 1;
        }
        #direction-text { font-size: 28px; color: #888; margin-top: 10px; }

        .pop {
            transform: scale(1.15);
            color: #ff3d00 !important;
            text-shadow: 0 0 30px rgba(255, 61, 0, 0.8) !important;
        }

        button {
            margin-top: 30px; padding: 18px 60px; font-size: 26px; font-weight: bold;
            border: none; border-radius: 50px; background-color: #2979ff; color: white;
            cursor: pointer; box-shadow: 0 4px 15px rgba(41, 121, 255, 0.4); transition: all 0.2s;
        }
        button:active { transform: scale(0.95); }
        button.stop { background-color: #ff3d00; box-shadow: 0 4px 15px rgba(255, 61, 0, 0.4); }

        .settings.hidden { display: none; }
        .tips { margin-top: 25px; font-size: 13px; color: #555; text-align: center; max-width: 85%; }
        .counter { margin-top: 15px; font-size: 16px; color: #666; }

        #voice-status {
            margin-top: 8px;
            font-size: 12px;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="title">🏸 羽毛球启动步训练</div>

    <div class="settings" id="settings">
        <div class="settings-title">⏱️ 间隔时间设置</div>
        <div class="setting-row">
            <label>最小间隔</label>
            <div>
                <input type="number" id="min-interval" value="3" min="1" max="10" step="0.5">
                <span class="unit">秒</span>
            </div>
        </div>
        <div class="setting-row">
            <label>最大间隔</label>
            <div>
                <input type="number" id="max-interval" value="5" min="1" max="15" step="0.5">
                <span class="unit">秒</span>
            </div>
        </div>
    </div>

    <div class="display-area">
        <div id="number-display">准备</div>
        <div id="direction-text"></div>
    </div>

    <button id="ctrl-btn">开始训练</button>

    <div class="counter" id="counter"></div>
    <div id="voice-status"></div>

    <div class="tips">
        听到语音提示瞬间，向对应钟表方向跨步并重心下沉。<br>
        建议将手机屏幕设置为"永不息屏"
    </div>

    <script>
        let isRunning = false;
        let timerId = null;
        let audioCtx = null;
        let stepCount = 0;
        let speechReady = false;
        let voicesList = [];

        const display = document.getElementById('number-display');
        const directionText = document.getElementById('direction-text');
        const btn = document.getElementById('ctrl-btn');
        const settingsPanel = document.getElementById('settings');
        const counterEl = document.getElementById('counter');
        const voiceStatus = document.getElementById('voice-status');
        const minInput = document.getElementById('min-interval');
        const maxInput = document.getElementById('max-interval');

        // ========== 音频初始化 ==========
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // 滴声
        function playBeep() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.25);
        }

        // ========== 语音合成 - 多重保障方案 ==========

        // 预缓存的音频 Buffers（方案B用）
        let numberBuffers = {};

        // 方案A：speechSynthesis
        function warmupSpeech() {
            return new Promise((resolve) => {
                if (!window.speechSynthesis) {
                    resolve(false);
                    return;
                }

                // 强制加载语音列表
                voicesList = window.speechSynthesis.getVoices();

                if (voicesList.length === 0) {
                    window.speechSynthesis.onvoiceschanged = () => {
                        voicesList = window.speechSynthesis.getVoices();
                    };
                }

                // 在用户点击上下文中，先发一句静音来解锁
                const warmup = new SpeechSynthesisUtterance('');
                warmup.volume = 0;
                warmup.lang = 'zh-CN';
                window.speechSynthesis.speak(warmup);

                // 再测试播放一句
                setTimeout(() => {
                    try {
                        window.speechSynthesis.cancel();
                        const test = new SpeechSynthesisUtterance('准备');
                        test.lang = 'zh-CN';
                        test.volume = 0.01; // 极小音量测试
                        test.rate = 2;

                        test.onend = () => {
                            speechReady = true;
                            resolve(true);
                        };
                        test.onerror = () => {
                            resolve(false);
                        };

                        window.speechSynthesis.speak(test);

                        // 超时兜底
                        setTimeout(() => resolve(speechReady), 1500);
                    } catch (e) {
                        resolve(false);
                    }
                }, 100);
            });
        }

        function speakWithSpeechSynthesis(text) {
            return new Promise((resolve) => {
                window.speechSynthesis.cancel();

                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = 'zh-CN';
                utter.rate = 1.3;
                utter.pitch = 1.0;
                utter.volume = 1.0;

                // 尝试选中文语音
                const zhVoice = voicesList.find(v =>
                    v.lang.includes('zh') || v.lang.includes('CN') || v.lang.includes('cmn')
                );
                if (zhVoice) {
                    utter.voice = zhVoice;
                }

                utter.onend = () => resolve(true);
                utter.onerror = () => resolve(false);

                window.speechSynthesis.speak(utter);

                // 超时兜底
                setTimeout(() => resolve(false), 2000);
            });
        }

        // 方案B：用 AudioContext 生成简易音调序列模拟数字
        // 不同数字对应不同的短音调模式，让用户可以辨别
        function generateToneForNumber(number) {
            if (!audioCtx) return;

            const baseFreq = 523.25; // C5
            const noteMap = {
                1:  [523],
                2:  [523, 659],
                3:  [523, 659, 784],
                4:  [523, 659, 784, 880],
                5:  [784, 659],
                6:  [784, 659, 523],
                7:  [880, 784, 659],
                8:  [880, 784, 659, 523],
                9:  [523, 784, 523],
                10: [659, 880, 659],
                11: [784, 523, 784],
                12: [880, 523, 880]
            };

            const notes = noteMap[number] || [523];
            const noteDuration = 0.12;
            const gap = 0.05;

            notes.forEach((freq, i) => {
                const startTime = audioCtx.currentTime + i * (noteDuration + gap);
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, startTime);
                gain.gain.setValueAtTime(0.6, startTime);
                gain.gain.exponentialRampToValueAtTime(0.001, startTime + noteDuration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(startTime);
                osc.stop(startTime + noteDuration);
            });
        }

        // 主播报函数：先尝试语音合成，失败则用音调
        async function speakNumber(number) {
            const text = `${number}点`;

            if (speechReady && window.speechSynthesis) {
                // 尝试用语音合成
                // 关键：iOS Safari 下 speechSynthesis 在非用户交互时可能静默失败
                // 所以我们同时播放 beep 保底
                try {
                    window.speechSynthesis.cancel();
                    const utter = new SpeechSynthesisUtterance(text);
                    utter.lang = 'zh-CN';
                    utter.rate = 1.3;
                    utter.volume = 1.0;

                    const zhVoice = voicesList.find(v =>
                        v.lang.includes('zh') || v.lang.includes('CN') || v.lang.includes('cmn')
                    );
                    if (zhVoice) utter.voice = zhVoice;

                    window.speechSynthesis.speak(utter);
                } catch (e) {
                    generateToneForNumber(number);
                }
            } else {
                generateToneForNumber(number);
            }
        }

        // ========== 间隔时间 ==========
        function getInterval() {
            let min = parseFloat(minInput.value) || 3;
            let max = parseFloat(maxInput.value) || 5;
            if (min > max) [min, max] = [max, min];
            min = Math.max(1, Math.min(min, 15));
            max = Math.max(1, Math.min(max, 15));
            return { min: min * 1000, max: max * 1000 };
        }

        // ========== 核心循环 ==========
        function triggerStep() {
            if (!isRunning) return;

            // 播放提示音
            playBeep();

            // 随机方向
            const dir = Math.floor(Math.random() * 12) + 1;
            display.innerText = dir;
            directionText.innerText = `${dir}点方向`;

            // 语音播报（延迟极短时间，让beep先响完）
            setTimeout(() => {
                if (isRunning) speakNumber(dir);
            }, 280);

            // 计数
            stepCount++;
            counterEl.innerText = `已完成: ${stepCount} 次`;

            // 视觉效果
            display.classList.add('pop');
            setTimeout(() => display.classList.remove('pop'), 200);

            // 下一次
            const { min, max } = getInterval();
            const delay = Math.floor(Math.random() * (max - min)) + min;
            timerId = setTimeout(triggerStep, delay);
        }

        // ========== 持续保持 speechSynthesis 活跃 ==========
        // iOS/Android 上如果长时间不调用，语音引擎会休眠
        let keepAliveTimer = null;

        function startKeepAlive() {
            keepAliveTimer = setInterval(() => {
                if (window.speechSynthesis && speechReady) {
                    // 每15秒发一次空白语音保活
                    window.speechSynthesis.cancel();
                    const silence = new SpeechSynthesisUtterance('');
                    silence.volume = 0;
                    window.speechSynthesis.speak(silence);
                }
            }, 15000);
        }

        function stopKeepAlive() {
            if (keepAliveTimer) {
                clearInterval(keepAliveTimer);
                keepAliveTimer = null;
            }
        }

        // ========== 按钮事件 ==========
        btn.addEventListener('click', async () => {
            initAudio();

            if (isRunning) {
                // ---- 停止 ----
                isRunning = false;
                clearTimeout(timerId);
                stopKeepAlive();
                if (window.speechSynthesis) window.speechSynthesis.cancel();

                btn.innerText = '开始训练';
                btn.classList.remove('stop');
                display.innerText = '准备';
                display.style.fontSize = '160px';
                directionText.innerText = '';
                settingsPanel.classList.remove('hidden');
                voiceStatus.innerText = '';

                if (stepCount > 0) {
                    counterEl.innerText = `本次训练: ${stepCount} 次`;
                }
            } else {
                // ---- 开始 ----
                // 先在用户点击的同步上下文中，预热语音引擎
                btn.disabled = true;
                btn.innerText = '初始化中...';
                voiceStatus.innerText = '正在加载语音引擎...';

                const speechOK = await warmupSpeech();

                if (speechOK) {
                    voiceStatus.innerText = '✅ 语音播报已就绪';
                } else {
                    voiceStatus.innerText = '⚠️ 语音不可用，将使用音调提示';
                }

                btn.disabled = false;
                isRunning = true;
                stepCount = 0;

                btn.innerText = '停止训练';
                btn.classList.add('stop');
                settingsPanel.classList.add('hidden');
                counterEl.innerText = '';

                startKeepAlive();

                // 倒计时
                display.style.fontSize = '80px';
                let cd = 3;
                display.innerText = cd;
                directionText.innerText = '准备...';

                const cdTimer = setInterval(() => {
                    cd--;
                    if (cd > 0) {
                        display.innerText = cd;
                    } else {
                        clearInterval(cdTimer);
                        if (isRunning) {
                            display.style.fontSize = '160px';
                            directionText.innerText = '';
                            triggerStep();
                        }
                    }
                }, 1000);
            }
        });

        // 防止训练中误触输入框
        [minInput, maxInput].forEach(input => {
            input.addEventListener('focus', () => {
                if (isRunning) input.blur();
            });
        });

        // 预加载语音列表
        if (window.speechSynthesis) {
            window.speechSynthesis.getVoices();
            window.speechSynthesis.onvoiceschanged = () => {
                voicesList = window.speechSynthesis.getVoices();
            };
        }
    </script>
</body>
</html>
