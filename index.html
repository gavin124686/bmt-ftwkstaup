<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>羽毛球启动步训练器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Orbitron', 'monospace'],
                        body: ['"Noto Sans SC"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --bg: #080c14;
            --card: #111827;
            --border: #1e293b;
            --fg: #e2e8f0;
            --muted: #64748b;
            --accent: #00e676;
            --alert: #ff5722;
            --info: #29b6f6;
        }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: 'Noto Sans SC', sans-serif;
            min-height: 100dvh;
        }

        .btn-go { background: var(--accent); color:#000; }
        .btn-sec { border:1px solid var(--border); }
        .settings-panel { max-height:0; overflow:hidden; transition:.3s; }
        .settings-panel.open { max-height:600px; }

        .dir-num {
            font-family: Orbitron;
            font-weight: 900;
            font-size: clamp(4rem, 18vw, 7rem);
        }

        @keyframes num-pop {
            0% { transform:scale(.2); opacity:0; }
            100% { transform:scale(1); opacity:1; }
        }
        .num-pop { animation:num-pop .28s ease-out; }
    </style>
</head>

<body>

<div class="relative z-10 max-w-md mx-auto px-4 py-5">

    <h1 class="text-center text-xl font-bold" style="color:var(--accent)">SHADOW STEP</h1>

    <div class="text-center mt-6">
        <div id="dirNum" class="dir-num" style="opacity:0;color:var(--alert)">--</div>
        <div id="statusText">准备就绪</div>
    </div>

    <div class="flex gap-3 mt-6">
        <button id="btnStart" class="btn-go flex-1 py-3 rounded-xl font-bold"
                onclick="toggleTraining()">开始训练</button>
        <button class="btn-sec px-4 rounded-xl" onclick="resetTraining()">重置</button>
    </div>

</div>

<script>
let audioCtx;
let isTraining=false;
let isPaused=false;
let state='idle';
let curDir=null;
let speechOn=true;
let soundOn=true;
let speechUnlocked=false;

/* ===== ⭐关键修复：移动端音频解锁 ===== */
function unlockAudio(){
    try{
        if(!audioCtx){
            audioCtx = new (window.AudioContext||window.webkitAudioContext)();
        }
        if(audioCtx.state === 'suspended'){
            audioCtx.resume();
        }

        // 兼容 iOS speech unlock
        const u = new SpeechSynthesisUtterance('');
        u.volume = 0.01;
        speechSynthesis.speak(u);
        speechSynthesis.cancel();

        speechUnlocked = true;
    }catch(e){}
}

document.addEventListener('touchstart', unlockAudio, {once:true});
document.addEventListener('click', unlockAudio, {once:true});

/* ===== 音频 ===== */
function playBell(){
    if(!soundOn) return;
    const ac = audioCtx;
    const now = ac.currentTime;

    [880,1100,880].forEach((f,i)=>{
        const o = ac.createOscillator();
        const g = ac.createGain();
        o.frequency.value=f;
        o.connect(g); g.connect(ac.destination);

        const t = now + i*0.12;
        g.gain.setValueAtTime(0,t);
        g.gain.linearRampToValueAtTime(0.2,t+0.01);
        g.gain.linearRampToValueAtTime(0,t+0.12);

        o.start(t);
        o.stop(t+0.15);
    });
}

/* ===== 语音（关键修复保留） ===== */
function speak(n){
    if(!speechOn) return;
    try{
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(String(n));
        u.lang='zh-CN';
        u.rate=1.1;
        speechSynthesis.speak(u);
    }catch(e){}
}

/* ===== 状态 ===== */
function enterGo(){
    state='go';
    curDir = Math.floor(Math.random()*12)+1;

    document.getElementById('dirNum').textContent=curDir;
    document.getElementById('dirNum').style.opacity=1;
    document.getElementById('dirNum').classList.add('num-pop');

    playBell();
    speak(curDir);
}

/* ===== 控制 ===== */
function toggleTraining(){
    if(!isTraining){
        isTraining=true;
        unlockAudio();
        enterGo();
    }else{
        isTraining=false;
        document.getElementById('dirNum').style.opacity=0;
        document.getElementById('statusText').innerText='已停止';
    }
}

function resetTraining(){
    isTraining=false;
    document.getElementById('dirNum').style.opacity=0;
    document.getElementById('dirNum').textContent='--';
}

/* 初始触发 */
unlockAudio();
</script>

</body>
</html>
