<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>羽毛球启动步训练器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Orbitron', 'monospace'],
                        body: ['"Noto Sans SC"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --bg: #080c14;
            --card: #111827;
            --border: #1e293b;
            --fg: #e2e8f0;
            --muted: #64748b;
            --accent: #00e676;
            --alert: #ff5722;
            --info: #29b6f6;
        }
        * { box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--fg);
            font-family: 'Noto Sans SC', sans-serif;
            min-height: 100dvh;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse at 15% 30%, rgba(0,230,118,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 70%, rgba(255,87,34,0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 90%, rgba(41,182,246,0.03) 0%, transparent 40%);
            pointer-events: none; z-index: 0;
        }
    </style>
</head>

<body>
<div class="relative z-10 min-h-dvh flex flex-col items-center px-4 py-5 max-w-md mx-auto select-none">

    <header class="text-center mb-4">
        <h1 class="font-display text-xl font-bold" style="color:var(--accent)">SHADOW STEP</h1>
        <p class="text-xs" style="color:var(--muted)">羽毛球启动步训练器</p>
    </header>

    <div class="text-center mt-6">
        <div id="dirNum" style="font-size:80px;color:var(--alert)">--</div>
        <div id="statusText">准备就绪</div>
    </div>

    <button onclick="testAudio()">测试音频</button>

</div>

<script>
/* ✅ 修复点：统一音频路径（关键） */
const AUDIO_BASE = "./audio/";

/* 示例：如果你未来要播放 mp3，用这个 */
function playAudio(file) {
    const audio = new Audio(AUDIO_BASE + file);
    audio.play().catch(e => console.warn("audio play failed:", e));
}

/* 示例测试 */
function testAudio() {
    playAudio("bell.mp3"); // ← 自动走 ./audio/bell.mp3
}
</script>

</body>
</html>
